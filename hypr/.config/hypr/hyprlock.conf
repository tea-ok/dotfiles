source = ~/.config/hypr/themes/catppuccin-frappe-hyprlock.conf

$accent = $mauve
$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpapers/wallhaven-k828w6.jpg
    blur_passes = 2
    blur_size = 4
    color = $base
}

label {
    monitor =
    text = Layout: $LAYOUT
    color = $subtext1
    font_size = 24
    font_family = $font
    position = 30, -30
    halign = left
    valign = top
}

label {
    monitor =
    text = $TIME
    color = $text
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $subtext1
    font_size = 24
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = $text
    font_size = 14
    font_family = $font
    position = 0, -107
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $surface0
    font_color = $text
    fade_on_empty = false
    placeholder_text = Logged in as $USER
    hide_input = false
    check_color = $accent
    fail_color = $red
    fail_text = $FAIL ($ATTEMPTS)
    capslock_color = $yellow
    position = 0, -47
    halign = center
    valign = center
}
