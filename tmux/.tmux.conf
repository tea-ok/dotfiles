unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#set-option -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Window names default to hostname of the current pane
set -g automatic-rename on
set -g automatic-rename-format "#{host_short}"

# Gruvbox-inspired native tmux statusline and pane styling
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#282828,fg=#a89984"
set -g message-style "bg=#d79921,fg=#282828,bold"
set -g message-command-style "bg=#458588,fg=#ebdbb2,bold"

set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#689d6a"

set -g window-status-separator ""
set -g window-status-style "fg=#a89984,bg=#3c3836"
set -g window-status-format "#[fg=#282828,bg=#3c3836]#[fg=#a89984,bg=#3c3836] #I #W #[fg=#3c3836,bg=#282828]"
set -g window-status-current-style "fg=#282828,bg=#83a598,bold"
set -g window-status-current-format "#[fg=#282828,bg=#83a598]#[fg=#282828,bg=#83a598,bold] #I #W #[fg=#83a598,bg=#282828]"
set -g window-status-last-style "fg=#ebdbb2,bg=#504945"
set -g window-status-activity-style "fg=#fabd2f,bg=#3c3836"
set -g window-status-bell-style "fg=#282828,bg=#fe8019,bold"

set -g status-left-length 80
set -g status-right-length 100
set -g status-left "#[fg=#282828,bg=#d79921,bold] ❐ #S #[fg=#d79921,bg=#458588,nobold]#[fg=#ebdbb2,bg=#458588] #{=/40/...;s|^#{HOME}|~|:pane_current_path} #[fg=#458588,bg=#282828]"
set -g status-right "#{?client_prefix,#[fg=#282828,bg=#fe8019,bold] PREFIX ,}#{?pane_in_mode,#[fg=#282828,bg=#b8bb26,bold] COPY ,}#[fg=#282828,bg=#282828]#{?client_prefix,,}#{?pane_in_mode,,}#[fg=#ebdbb2,bg=#504945] %a %d %b #[fg=#282828,bg=#689d6a,bold] 󰥔 %H:%M "

run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
