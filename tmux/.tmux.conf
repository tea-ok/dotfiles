unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s
set -g mouse on

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#set-option -g status-position top

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Window names default to hostname of the current pane
set -g automatic-rename on
set -g automatic-rename-format "#{host_short}"

# TokyoNight Night-inspired native tmux statusline and pane styling
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g message-style "bg=#e0af68,fg=#1a1b26,bold"
set -g message-command-style "bg=#7aa2f7,fg=#c0caf5,bold"

set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#9ece6a"

set -g window-status-separator ""
set -g window-status-style "fg=#a9b1d6,bg=#24283b"
set -g window-status-format "#[fg=#1a1b26,bg=#24283b]#[fg=#a9b1d6,bg=#24283b] #I #W #[fg=#24283b,bg=#1a1b26]"
set -g window-status-current-style "fg=#1a1b26,bg=#7aa2f7,bold"
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7]#[fg=#1a1b26,bg=#7aa2f7,bold] #I #W #[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-last-style "fg=#c0caf5,bg=#414868"
set -g window-status-activity-style "fg=#e0af68,bg=#24283b"
set -g window-status-bell-style "fg=#1a1b26,bg=#ff9e64,bold"

set -g status-left-length 80
set -g status-right-length 100
set -g status-left "#[fg=#1a1b26,bg=#bb9af7,bold] ❐ #S #[fg=#bb9af7,bg=#7aa2f7,nobold]#[fg=#c0caf5,bg=#7aa2f7] #{=/40/...;s|^#{HOME}|~|:pane_current_path} #[fg=#7aa2f7,bg=#1a1b26]"
set -g status-right "#{?client_prefix,#[fg=#1a1b26,bg=#ff9e64,bold] PREFIX ,}#{?pane_in_mode,#[fg=#1a1b26,bg=#9ece6a,bold] COPY ,}#[fg=#1a1b26,bg=#1a1b26]#{?client_prefix,,}#{?pane_in_mode,,}#[fg=#414868,bg=#1a1b26]#[fg=#c0caf5,bg=#414868] %a %d %b #[fg=#9ece6a,bg=#414868]#[fg=#1a1b26,bg=#9ece6a,bold]󰥔 %H:%M "

run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
