# Inspired by the existing Ghostty setup:
# Catppuccin Frappe, light transparency, subtle blur, compact padding,
# JetBrains Mono, zsh, and clipboard-first keybindings.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 13.0

shell zsh

background_opacity 0.95
background_blur 5
dynamic_background_opacity yes

window_padding_width 8
placement_strategy center
hide_window_decorations no

cursor #babbf1
cursor_text_color background
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0

# Native Kitty cursor trail. Low trigger/threshold keeps it close to
# Neovide's smooth-cursor feel without waiting for very large jumps.
cursor_trail 8
cursor_trail_decay 0.08 0.28
cursor_trail_start_threshold 1
cursor_trail_color none

scrollback_lines 10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0
pixel_scroll yes
momentum_scroll 0.96
scrollbar scrolled
scrollbar_width 0.5
scrollbar_handle_opacity 0.35
scrollbar_track_opacity 0

copy_on_select clipboard
strip_trailing_spaces smart
paste_actions quote-urls-at-prompt,confirm

map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Catppuccin Frappe
foreground #c6d0f5
background #303446
selection_foreground #303446
selection_background #f2d5cf
url_color #8caaee

active_border_color #babbf1
inactive_border_color #626880
