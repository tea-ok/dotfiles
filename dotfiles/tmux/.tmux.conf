unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",tmux-256color:RGB"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Window names default to hostname of the current pane
set -g automatic-rename on
set -g automatic-rename-format "#{host_short}"
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120

# Catppuccin Frappe appearance, implemented with built-in tmux styling.
set -g status-style "bg=#292c3c,fg=#c6d0f5"
set -g message-style "bg=#303446,fg=#c6d0f5"
set -g message-command-style "bg=#303446,fg=#c6d0f5"
set -g pane-border-style "fg=#303446"
set -g pane-active-border-style "fg=#8caaee"
set -g mode-style "bg=#414559,fg=#c6d0f5,bold"

set -g status-left "#{?client_prefix,#[fg=#e5c890 bold]🌕,#[fg=#8caaee bold]🌑} #[fg=#8caaee bold]#S #[fg=#737994]│ "
set -g status-right "#[fg=#a6d189 bold]#H #[fg=#737994]│ #[fg=#81c8be bold]%Y-%m-%d #[fg=#737994]│ #[fg=#ca9ee6 bold]%H:%M #[default]"

setw -g window-status-format " #{?window_bell_flag,🔔 ,}#{?window_activity_flag,📣 ,}#{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-current-format " #{?window_zoomed_flag,🔍 ,}#I #W "
setw -g window-status-style "bg=#292c3c,fg=#737994"
setw -g window-status-current-style "bg=#303446,fg=#c6d0f5,bold"
setw -g window-status-bell-style "bg=#292c3c,fg=#e78284,bold"
setw -g window-status-activity-style "bg=#292c3c,fg=#e5c890,bold"

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Match nvim-tree / NERDTree split bindings
unbind s
bind s split-window -h -c "#{pane_current_path}"  # vertical pane
bind i split-window -v -c "#{pane_current_path}"  # horizontal pane
